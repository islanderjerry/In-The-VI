<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>in-the-vi.com</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      animation: slideShow 20s infinite;
      z-index: -1;
    }

    @keyframes slideShow {
      0%   { background-image: url('image1.png'); }
      25%  { background-image: url('image2.png'); }
      50%  { background-image: url('image3.png'); }
      75%  { background-image: url('image4.png'); }
      100% { background-image: url('image1.png'); }
    }

    .content {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
    }
  </style>
</head>
<body>

<div class="background"></div>

<div class="content">
  <h1>in-the-vi.com</h1>
  <p>Our website is currently under construction.</p>
  <p>Please check back soon for updates.</p>
</div>

</body>
</html>
